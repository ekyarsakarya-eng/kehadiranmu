<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Absensi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
   .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
   .modal-content { background-color: #fefefe; margin: 3% auto; padding: 20px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
   .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="app"></div>
  <div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
